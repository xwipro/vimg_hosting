<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 服务器挂了🐾</title>
    <link rel="shortcut icon" href="https://vpic.page.gd/api/uploads/6a14837b4c584c65f2238ae38bf59bbc.png" type="image/x-icon">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        *::-webkit-scrollbar {display: none;}

        :root {
            --white-color: #fff;
            --font-color: #3b3b3b;
        }


        html, body {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, #E8F4FF, #FFEEF8);
            overflow: hidden;
        }

        .error_box {
            display: flex;
            justify-content: center;
            width: 60%;
            height: 70%;
            background: var(--white-color);
            border-radius: 1rem;
            box-shadow: 0 0 1.2rem rgba(0, 0, 0, .1);
            margin-top: 3rem;
            position: relative;
        }

        .error_box > h1 {
            user-select: none;
            white-space: nowrap;
            padding: .5rem 3rem;
            background: var(--white-color);
            border-radius: 1rem;
            border: 1px dotted #c3c3c3;
            color: var(--font-color);
            position: absolute;
            top: -2rem;
        }
        .error_box > h1::before {
            content: "🐾";
            position: absolute;
            left: -.3rem;
            top: -.8rem;
            transform: rotate(-30deg);
        }
        .error_box > button {
            position: absolute;
            bottom: .5rem;
            height: 3rem;
            padding: 0 3rem;
            outline: none;
            border: 1px solid #c3c3c3;
            border-radius: 3rem;
            background: transparent;
            backdrop-filter: blur(1rem);
            letter-spacing: .1rem;
            font-size: .9rem;
            overflow: hidden;
        }
        .error_box > button::before {
            content: "返回";
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: var(--white-color);
            background: #ff22aa;
            position: absolute;
            left: -100%;
            top: 0;
            overflow: hidden;
            border-radius: 5rem;
            transition: left .3s;
        }
        .error_box > button:hover::before {
            left: 0;
        }

        .error_text {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .error_text > span {
            user-select: none;
            white-space: nowrap;
            font-size: 8rem;
            font-weight: bold;
            letter-spacing: .5rem;
            color: #ff22aa;
        }
    </style>
</head>
<body>
    <div class="error_box">
        <h1>我草完了，服务器出现问题了快联系管理解决</h1>
        <div class="error_text">
            <span>500</span>
        </div>
        <button onclick="goBack()">返回</button>
    </div>
    <script>
        const goBack = () => {
            window.history.back();
            setTimeout(() => location.reload(), 100);
        }
    </script>
</body>
</html>
